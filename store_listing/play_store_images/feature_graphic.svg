<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 500" width="1024" height="500">
  <!-- Google Play Feature Graphic: 1024x500 -->
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0e2a"/>
      <stop offset="60%" style="stop-color:#0d1b4e"/>
      <stop offset="100%" style="stop-color:#1a237e"/>
    </linearGradient>
    <linearGradient id="panel" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3f51b5"/>
      <stop offset="100%" style="stop-color:#283593"/>
    </linearGradient>
    <linearGradient id="panelGreen" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2e7d32"/>
      <stop offset="100%" style="stop-color:#1b5e20"/>
    </linearGradient>
    <linearGradient id="moonGrad" x1="20%" y1="0%" x2="80%" y2="100%">
      <stop offset="0%" style="stop-color:#e8eaf6"/>
      <stop offset="100%" style="stop-color:#c5cae9"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.4"/>
    </filter>
    <mask id="moon">
      <circle cx="220" cy="250" r="120" fill="white"/>
      <circle cx="278" cy="220" r="100" fill="black"/>
    </mask>
  </defs>

  <!-- Background -->
  <rect width="1024" height="500" fill="url(#bg)"/>

  <!-- Stars -->
  <circle cx="60"  cy="40"  r="2" fill="white" opacity="0.6"/>
  <circle cx="160" cy="25"  r="3" fill="white" opacity="0.5"/>
  <circle cx="340" cy="60"  r="2" fill="white" opacity="0.4"/>
  <circle cx="460" cy="20"  r="2" fill="white" opacity="0.5"/>
  <circle cx="520" cy="80"  r="3" fill="white" opacity="0.4"/>
  <circle cx="80"  cy="140" r="2" fill="white" opacity="0.4"/>
  <circle cx="50"  cy="350" r="2" fill="white" opacity="0.4"/>
  <circle cx="120" cy="440" r="3" fill="white" opacity="0.5"/>
  <circle cx="400" cy="460" r="2" fill="white" opacity="0.4"/>
  <path d="M480 55 L482 62 L489 64 L482 66 L480 73 L478 66 L471 64 L478 62 Z" fill="white" opacity="0.7"/>
  <path d="M100 200 L102 207 L109 209 L102 211 L100 218 L98 211 L91 209 L98 207 Z" fill="white" opacity="0.5"/>

  <!-- Moon (left area) -->
  <circle cx="220" cy="250" r="120" fill="url(#moonGrad)" mask="url(#moon)" filter="url(#glow)"/>

  <!-- Zzz near moon -->
  <text x="318" y="155" font-family="Arial, sans-serif" font-size="46" font-weight="900"
        fill="none" stroke="#9fa8da" stroke-width="3"
        transform="rotate(-12,318,155)" opacity="0.85">Z</text>
  <text x="362" y="118" font-family="Arial, sans-serif" font-size="32" font-weight="900"
        fill="none" stroke="#9fa8da" stroke-width="2.5"
        transform="rotate(-12,362,118)" opacity="0.60">Z</text>
  <text x="397" y="90" font-family="Arial, sans-serif" font-size="22" font-weight="900"
        fill="none" stroke="#9fa8da" stroke-width="2"
        transform="rotate(-12,397,90)" opacity="0.38">Z</text>

  <!-- Number panels (4 corners of a virtual grid, right of moon) -->
  <rect x="100" y="100" width="88" height="88" rx="14" fill="url(#panel)" filter="url(#shadow)"/>
  <text x="144" y="155" font-family="Arial, sans-serif" font-size="54" font-weight="900" fill="white" text-anchor="middle" dominant-baseline="central">1</text>

  <rect x="310" y="100" width="88" height="88" rx="14" fill="url(#panel)" filter="url(#shadow)"/>
  <text x="354" y="155" font-family="Arial, sans-serif" font-size="54" font-weight="900" fill="white" text-anchor="middle" dominant-baseline="central">2</text>

  <rect x="100" y="310" width="88" height="88" rx="14" fill="url(#panelGreen)" filter="url(#shadow)"/>
  <text x="144" y="365" font-family="Arial, sans-serif" font-size="54" font-weight="900" fill="#a5d6a7" text-anchor="middle" dominant-baseline="central">3</text>

  <rect x="310" y="310" width="88" height="88" rx="14" fill="url(#panel)" filter="url(#shadow)"/>
  <text x="354" y="365" font-family="Arial, sans-serif" font-size="54" font-weight="900" fill="white" text-anchor="middle" dominant-baseline="central">4</text>

  <!-- Divider line -->
  <line x1="530" y1="60" x2="530" y2="440" stroke="#5c6bc0" stroke-width="1" opacity="0.4"/>

  <!-- Right side: App name + tagline -->
  <!-- App name -->
  <text x="790" y="170"
        font-family="'Arial Rounded MT Bold', Arial, sans-serif"
        font-size="64" font-weight="900"
        fill="white" text-anchor="middle">寝落ち</text>
  <text x="790" y="248"
        font-family="'Arial Rounded MT Bold', Arial, sans-serif"
        font-size="64" font-weight="900"
        fill="#9fa8da" text-anchor="middle">チャレンジ</text>

  <!-- Tagline -->
  <text x="790" y="315"
        font-family="Arial, sans-serif" font-size="26" fill="#c5cae9"
        text-anchor="middle">数字をタップして自然に眠ろう</text>

  <!-- Feature tags -->
  <rect x="600" y="360" width="180" height="44" rx="22" fill="#283593" opacity="0.9"/>
  <text x="690" y="388" font-family="Arial, sans-serif" font-size="20" fill="#9fa8da" text-anchor="middle">🧠 脳トレ</text>

  <rect x="800" y="360" width="180" height="44" rx="22" fill="#283593" opacity="0.9"/>
  <text x="890" y="388" font-family="Arial, sans-serif" font-size="20" fill="#9fa8da" text-anchor="middle">😴 快眠サポート</text>
</svg>
