<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <!--
    Concept C: The moon IS a number tile.
    A large central tile (like a game panel) displays the crescent moon instead of a number.
    Surrounded by smaller numbered tiles — blending both identities into one shape.
  -->
  <defs>
    <linearGradient id="bgC" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1445"/>
      <stop offset="100%" style="stop-color:#0a0e2a"/>
    </linearGradient>
    <linearGradient id="bigTile" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#283593"/>
      <stop offset="100%" style="stop-color:#1a237e"/>
    </linearGradient>
    <linearGradient id="smallTile" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3949ab"/>
      <stop offset="100%" style="stop-color:#283593"/>
    </linearGradient>
    <linearGradient id="moonC" x1="10%" y1="0%" x2="90%" y2="100%">
      <stop offset="0%" style="stop-color:#fff9e6"/>
      <stop offset="100%" style="stop-color:#d1d9ff"/>
    </linearGradient>
    <filter id="tileShadow">
      <feDropShadow dx="0" dy="6" stdDeviation="12" flood-color="#000" flood-opacity="0.5"/>
    </filter>
    <filter id="moonGlowC">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <mask id="moonMaskC">
      <circle cx="512" cy="490" r="155" fill="white"/>
      <circle cx="588" cy="452" r="128" fill="black"/>
    </mask>
  </defs>

  <!-- Background -->
  <rect width="1024" height="1024" fill="url(#bgC)"/>

  <!-- Stars in background -->
  <circle cx="100" cy="100" r="3" fill="white" opacity="0.5"/>
  <circle cx="920" cy="80" r="4" fill="white" opacity="0.6"/>
  <circle cx="60" cy="500" r="2" fill="white" opacity="0.4"/>
  <circle cx="960" cy="400" r="3" fill="white" opacity="0.5"/>
  <circle cx="200" cy="900" r="3" fill="white" opacity="0.4"/>
  <circle cx="850" cy="920" r="2" fill="white" opacity="0.5"/>
  <path d="M160 300 L163 312 L175 315 L163 318 L160 330 L157 318 L145 315 L157 312 Z" fill="white" opacity="0.6"/>
  <path d="M870 600 L873 610 L883 613 L873 616 L870 626 L867 616 L857 613 L867 610 Z" fill="white" opacity="0.5"/>

  <!-- Small tiles: top row (3 tiles) -->
  <rect x="72"  y="72" width="192" height="192" rx="30" fill="url(#smallTile)" filter="url(#tileShadow)"/>
  <rect x="72"  y="72" width="192" height="192" rx="30" fill="none" stroke="#5c6bc0" stroke-width="2.5"/>
  <text x="168" y="178" font-family="Arial, sans-serif" font-size="120" font-weight="900" fill="white" text-anchor="middle" dominant-baseline="central">1</text>

  <rect x="416" y="72" width="192" height="192" rx="30" fill="url(#smallTile)" filter="url(#tileShadow)"/>
  <rect x="416" y="72" width="192" height="192" rx="30" fill="none" stroke="#5c6bc0" stroke-width="2.5"/>
  <text x="512" y="178" font-family="Arial, sans-serif" font-size="120" font-weight="900" fill="white" text-anchor="middle" dominant-baseline="central">2</text>

  <rect x="760" y="72" width="192" height="192" rx="30" fill="url(#smallTile)" filter="url(#tileShadow)"/>
  <rect x="760" y="72" width="192" height="192" rx="30" fill="none" stroke="#5c6bc0" stroke-width="2.5"/>
  <text x="856" y="178" font-family="Arial, sans-serif" font-size="120" font-weight="900" fill="white" text-anchor="middle" dominant-baseline="central">3</text>

  <!-- Left side tile -->
  <rect x="72" y="416" width="192" height="192" rx="30" fill="url(#smallTile)" filter="url(#tileShadow)"/>
  <rect x="72" y="416" width="192" height="192" rx="30" fill="none" stroke="#5c6bc0" stroke-width="2.5"/>
  <text x="168" y="522" font-family="Arial, sans-serif" font-size="120" font-weight="900" fill="white" text-anchor="middle" dominant-baseline="central">4</text>

  <!-- Right side tile -->
  <rect x="760" y="416" width="192" height="192" rx="30" fill="url(#smallTile)" filter="url(#tileShadow)"/>
  <rect x="760" y="416" width="192" height="192" rx="30" fill="none" stroke="#5c6bc0" stroke-width="2.5"/>
  <text x="856" y="522" font-family="Arial, sans-serif" font-size="120" font-weight="900" fill="white" text-anchor="middle" dominant-baseline="central">5</text>

  <!-- Small tiles: bottom row (3 tiles) -->
  <rect x="72"  y="760" width="192" height="192" rx="30" fill="url(#smallTile)" filter="url(#tileShadow)"/>
  <rect x="72"  y="760" width="192" height="192" rx="30" fill="none" stroke="#5c6bc0" stroke-width="2.5"/>
  <text x="168" y="866" font-family="Arial, sans-serif" font-size="120" font-weight="900" fill="white" text-anchor="middle" dominant-baseline="central">6</text>

  <rect x="416" y="760" width="192" height="192" rx="30" fill="url(#smallTile)" filter="url(#tileShadow)"/>
  <rect x="416" y="760" width="192" height="192" rx="30" fill="none" stroke="#5c6bc0" stroke-width="2.5"/>
  <text x="512" y="866" font-family="Arial, sans-serif" font-size="120" font-weight="900" fill="white" text-anchor="middle" dominant-baseline="central">7</text>

  <rect x="760" y="760" width="192" height="192" rx="30" fill="url(#smallTile)" filter="url(#tileShadow)"/>
  <rect x="760" y="760" width="192" height="192" rx="30" fill="none" stroke="#5c6bc0" stroke-width="2.5"/>
  <text x="856" y="866" font-family="Arial, sans-serif" font-size="120" font-weight="900" fill="white" text-anchor="middle" dominant-baseline="central">8</text>

  <!-- LARGE CENTER TILE — contains moon instead of a number -->
  <rect x="282" y="282" width="460" height="460" rx="56" fill="url(#bigTile)" filter="url(#tileShadow)"/>
  <rect x="282" y="282" width="460" height="460" rx="56" fill="none" stroke="#7986cb" stroke-width="4"/>

  <!-- Crescent Moon in center tile -->
  <circle cx="512" cy="490" r="155" fill="url(#moonC)" mask="url(#moonMaskC)" filter="url(#moonGlowC)"/>

  <!-- Stars inside big tile -->
  <circle cx="340" cy="340" r="5" fill="white" opacity="0.7"/>
  <circle cx="690" cy="360" r="4" fill="white" opacity="0.6"/>
  <circle cx="310" cy="620" r="4" fill="white" opacity="0.5"/>
  <circle cx="700" cy="640" r="5" fill="white" opacity="0.6"/>
</svg>
